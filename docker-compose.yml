services:
  app:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      target: production
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - ui
    restart: unless-stopped

  tests:
    build:
      context: .
      target: test
    profiles:
      - test
    env_file:
      - .env
    environment:
      - LOG_LEVEL=WARNING
